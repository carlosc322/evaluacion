{% endblock %}

{%block content%}
<div class="welcome-panel">

        <a href="/admin/" class="welcome-btn welcome-btn-main">

        <a href="{% url 'perfilAdm' %}" class="welcome-btn welcome-btn-secondary">

{% endblock %}
